<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>铜矿估值计算器 | Copper Mine Valuation Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #e8e8e8;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
h1 {
  text-align: center;
  color: #ff6b35;
  font-size: 32px;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.subtitle {
  text-align: center;
  color: #aaa;
  font-size: 14px;
  margin-bottom: 30px;
}
.input-section {
  background: rgba(255,255,255,0.03);
  padding: 25px;
  border-radius: 8px;
  margin-bottom: 25px;
}
.input-group {
  margin-bottom: 20px;
}
label {
  display: block;
  color: #ff6b35;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
input, select {
  width: 100%;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,107,53,0.3);
  border-radius: 6px;
  color: #fff;
  font-size: 16px;
}
input:focus, select:focus {
  outline: none;
  border-color: #ff6b35;
  background: rgba(255,255,255,0.12);
}
.unit-toggle {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
.unit-btn {
  flex: 1;
  padding: 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,107,53,0.3);
  color: #aaa;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.3s;
}
.unit-btn.active {
  background: #ff6b35;
  color: #fff;
  border-color: #ff6b35;
}
.calc-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
  border: none;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: transform 0.2s;
}
.calc-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,107,53,0.4);
}
.result-section {
  background: rgba(255,255,255,0.03);
  padding: 25px;
  border-radius: 8px;
  margin-top: 25px;
  display: none;
}
.result-section.show {
  display: block;
}
.result-title {
  color: #ff6b35;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  text-transform: uppercase;
}
.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-left: 4px solid #ff6b35;
  margin-bottom: 15px;
  border-radius: 6px;
}
.result-label {
  font-size: 14px;
  color: #aaa;
  text-transform: uppercase;
}
.result-value {
  font-size: 24px;
  font-weight: 700;
  color: #ff6b35;
}
.result-sub {
  font-size: 12px;
  color: #888;
  margin-top: 5px;
}
.comps-table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
.comps-table th {
  background: rgba(255,107,53,0.2);
  padding: 12px;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  color: #ff6b35;
  border-bottom: 2px solid #ff6b35;
}
.comps-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 13px;
}
.comps-table tr:hover {
  background: rgba(255,255,255,0.05);
}
</style>
</head>
<body>
<div class="container">
  <h1>🔶 铜矿估值计算器</h1>
  <div class="subtitle">Copper Mine Valuation Tool | 基于真实交易数据的可比估值法</div>

  <div class="input-section">
    <div class="input-group">
      <label>资源量 Resource Size</label>
      <input type="number" id="resourceInput" placeholder="例如: 100" min="0" step="1">
      <div class="unit-toggle">
        <button class="unit-btn active" onclick="setUnit('mt')">Mt 矿石 (百万吨)</button>
        <button class="unit-btn" onclick="setUnit('ktcu')">万吨Cu (金属量)</button>
      </div>
    </div>

    <div class="input-group">
      <label>铜品位 Copper Grade (%)</label>
      <input type="number" id="gradeInput" placeholder="例如: 0.8" min="0" max="10" step="0.1">
    </div>

    <div class="input-group">
      <label>当前铜价 Current Copper Price (USD/lb)</label>
      <input type="number" id="priceInput" value="4.5" min="2" max="10" step="0.1">
    </div>

    <div class="input-group">
      <label>开发阶段 Development Stage</label>
      <select id="stageSelect">
        <option value="3">Reserve (储量)</option>
        <option value="4" selected>Production (生产)</option>
      </select>
    </div>

    <button class="calc-btn" onclick="calculate()">▶ 计算估值 Calculate</button>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-title">估值结果 Valuation Results</div>

    <div class="result-row">
      <div>
        <div class="result-label">低值 (P25)</div>
        <div class="result-sub" id="lowSub"></div>
      </div>
      <div class="result-value" id="lowValue">--</div>
    </div>

    <div class="result-row">
      <div>
        <div class="result-label">中值 (P50)</div>
        <div class="result-sub" id="midSub"></div>
      </div>
      <div class="result-value" id="midValue">--</div>
    </div>

    <div class="result-row">
      <div>
        <div class="result-label">高值 (P75)</div>
        <div class="result-sub" id="highSub"></div>
      </div>
      <div class="result-value" id="highValue">--</div>
    </div>

    <div class="result-title" style="margin-top:30px;">可比交易 Comparable Transactions</div>
    <table class="comps-table" id="compsTable">
      <thead>
        <tr>
          <th>项目 Project</th>
          <th>年份</th>
          <th>资源量 Mt</th>
          <th>品位 %</th>
          <th>金属量 kt</th>
          <th>EV/lb</th>
        </tr>
      </thead>
      <tbody id="compsBody"></tbody>
    </table>
  </div>
</div>

<script>

const copperDeals = [
  // [resource_mt_ore, cu_grade_pct, cu_metal_kt, ev_usd_m, ev_per_lb_cu, stage, year, country, deposit_type, project_name]
  [1650, 1.2, 1980, 6400, 0.73, 4, 2023, 'Australia', 'IOCG + Porphyry', 'OZ Minerals Portfolio (BHP)'],
  [4200, 0.35, 1470, 19100, 2.95, 4, 2023, 'Australia', 'Porphyry Cu-Au', 'Newcrest/Cadia (Newmont)'],
  [3500, 0.51, 1785, 3300, 0.42, 4, 2022, 'Mongolia', 'Porphyry Cu-Au', 'Turquoise Hill/Oyu Tolgoi (Rio Tinto)'],
  [45, 2.8, 126, 1870, 3.37, 4, 2022, 'Spain', 'VMS Cu-Zn', 'MATSA (Sandfire)'],
  [380, 0.28, 106, 439, 0.94, 4, 2021, 'Canada', 'Porphyry Cu', 'Copper Mountain (Hudbay)'],
  [1100, 0.48, 528, 1200, 0.52, 3, 2018, 'Chile', 'Porphyry Cu', 'Quebrada Blanca 30% (Sumitomo)'],
  [800, 2.5, 2000, 960, 0.11, 4, 2016, 'DRC', 'Sediment Cu-Co', 'Katanga+Mutanda (Glencore)'],
  [450, 0.45, 202, 1030, 1.16, 4, 2015, 'Chile', 'Porphyry Cu', 'Zaldívar 50% (Antofagasta)'],
  [2200, 0.73, 1606, 5850, 0.83, 3, 2014, 'Peru', 'Porphyry Cu-Mo', 'Las Bambas (MMG)'],
  [1800, 0.38, 684, 4160, 1.38, 3, 2014, 'Chile', 'Porphyry Cu-Mo', 'Sierra Gorda (KGHM)'],
];


let currentUnit = 'mt';

function setUnit(unit) {
  currentUnit = unit;
  document.querySelectorAll('.unit-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

function percentile(arr, p) {
  const sorted = [...arr].sort((a,b) => a-b);
  const idx = (p/100) * (sorted.length - 1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  return lo === hi ? sorted[lo] : sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
}

function calculate() {
  const resourceInput = parseFloat(document.getElementById('resourceInput').value);
  const grade = parseFloat(document.getElementById('gradeInput').value);
  const copperPrice = parseFloat(document.getElementById('priceInput').value);
  const stage = parseInt(document.getElementById('stageSelect').value);

  if (!resourceInput || !grade) {
    alert('请输入资源量和品位！');
    return;
  }

  // 计算铜金属量（万吨）
  let cuMetalKt;
  if (currentUnit === 'mt') {
    cuMetalKt = resourceInput * grade / 100 * 10; // Mt * % / 100 * 10 = 万吨
  } else {
    cuMetalKt = resourceInput; // 已经是万吨
  }

  // 筛选可比交易
  const comps = copperDeals
    .filter(d => d[5] === stage)
    .map(d => ({
      ...d,
      adjEv: d[4] * (copperPrice / 4.5) // 标准化到当前铜价
    })))
    .sort((a,b) => Math.abs(a[2] - cuMetalKt) - Math.abs(b[2] - cuMetalKt))
    .slice(0, 5);

  const evValues = comps.map(d => d.adjEv);
  const p25 = percentile(evValues, 25);
  const p50 = percentile(evValues, 50);
  const p75 = percentile(evValues, 75);

  // 计算总价值（百万美元）
  const cuMetalLb = cuMetalKt * 10000 * 2204.62; // 万吨 -> 磅
  const totalLow = (p25 * cuMetalLb / 1e6).toFixed(0);
  const totalMid = (p50 * cuMetalLb / 1e6).toFixed(0);
  const totalHigh = (p75 * cuMetalLb / 1e6).toFixed(0);

  // 显示结果
  document.getElementById('lowValue').textContent = `$$${p25.toFixed(2)}/lb`;
  document.getElementById('midValue').textContent = `$$${p50.toFixed(2)}/lb`;
  document.getElementById('highValue').textContent = `$$${p75.toFixed(2)}/lb`;

  document.getElementById('lowSub').textContent = `总价值: $$${totalLow}M | 铜金属: ${cuMetalKt.toFixed(0)}万吨`;
  document.getElementById('midSub').textContent = `总价值: $$${totalMid}M | 铜金属: ${cuMetalKt.toFixed(0)}万吨`;
  document.getElementById('highSub').textContent = `总价值: $$${totalHigh}M | 铜金属: ${cuMetalKt.toFixed(0)}万吨`;

  // 显示可比交易
  const tbody = document.getElementById('compsBody');
  tbody.innerHTML = comps.map(d => `
    <tr>
      <td>${d[9]}</td>
      <td>${d[6]}</td>
      <td>${d[0].toFixed(0)}</td>
      <td>${d[1].toFixed(2)}%</td>
      <td>${d[2].toFixed(0)}</td>
      <td style="color:#ff6b35;font-weight:600;">${d.adjEv.toFixed(2)}</td>
    </tr>
  `).join('');

  document.getElementById('resultSection').classList.add('show');
}
</script>
</body>
</html>
